spring.application.name=event-commerce-backend

# ===============================
# = PROFILE
# ===============================
spring.profiles.active=local


############################################
# DATASOURCE
############################################
spring.datasource.url=jdbc:postgresql://localhost:5432/eventcommerce
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

############################################
# HIKARI CONNECTION POOL
############################################
spring.datasource.hikari.pool-name=EventCommercePool

# Minimum number of idle connections
spring.datasource.hikari.minimum-idle=5

# Maximum number of connections in the pool
spring.datasource.hikari.maximum-pool-size=10

# Maximum time to wait for a connection (30 seconds)
spring.datasource.hikari.connection-timeout=30000

# Maximum idle time (5 minutes)
spring.datasource.hikari.idle-timeout=300000

# Maximum lifetime of a connection (30 minutes)
spring.datasource.hikari.max-lifetime=1800000

# Validation timeout (5 seconds)
spring.datasource.hikari.validation-timeout=5000

############################################
# FLYWAY
############################################
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

############################################
# ACTUATOR
############################################
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

############################################
# LOGGING
############################################
logging.level.com.eventcommerce=DEBUG
logging.level.org.springframework.jdbc=INFO

############################################
# SQL LOGGING
############################################
logging.level.org.springframework.jdbc.core=DEBUG